name: Automated Wage Crawler

on:
  push:
    paths:
      - 'scripts/scraper/**'
  schedule:
    # Run at 18:00 UTC every Sunday (11:30 PM IST Sunday)
    - cron: '0 18 * * 0'
  workflow_dispatch:
    inputs:
      target_state:
        description: 'State ID to crawl (e.g., dl, hr, up, ka) or "all"'
        required: true
        default: 'all'

jobs:
  crawl:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        state_batch: ['batch_1', 'batch_2', 'batch_3', 'batch_4']
      max-parallel: 1
      fail-fast: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r scripts/scraper/requirements.txt

      - name: Run Crawler
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          API_SECRET: ${{ secrets.API_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Use manual input if dispatched, else run matrix batch
          TARGET_STATE: ${{ github.event.inputs.target_state || matrix.state_batch }}
        run: python scripts/scraper/crawler.py

      - name: Send Failure Notification via Resend
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          curl -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "onboarding@resend.dev",
              "to": ["judge.raman@gmail.com", "raman@ramanjudge.com"],
              "subject": "🚨 Wage Crawler Failed!",
              "html": "<strong>Alert:</strong> The automated web crawler for Minimum Wages has failed during its recent run. Please check the GitHub Actions logs."
            }'
