name: Historical Gazette Backfill

on:
  workflow_dispatch:
    inputs:
      target_state:
        description: 'Target to crawl: State ID (e.g. dl), Batch ID (e.g. batch_1)'
        required: true
        default: 'batch_1'
      target_year:
        description: 'Year of the Gazette to backfill (e.g., 2024, 2023)'
        required: true
        default: '2024'

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Set up job
        run: echo "Starting backfill job for ${{ github.event.inputs.target_state }} (Year ${{ github.event.inputs.target_year }})"

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r scripts/scraper/requirements.txt

      - name: Run Historical Backfill
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          API_SECRET: ${{ secrets.API_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          TARGET_STATE: ${{ github.event.inputs.target_state }}
          TARGET_YEAR: ${{ github.event.inputs.target_year }}
          IS_BACKFILL: 'true'
        run: python -u scripts/scraper/crawler.py
